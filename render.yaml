services:
  - type: web
    name: stockverse
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FINNHUB_API_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: STOCKVERSE_DATA_DIR
        value: /var/data/stockverse
    disk:
      name: stockverse-data
      mountPath: /var/data
      sizeGB: 1
