services:
  - type: web
    name: stockverse
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
      - key: STOCKVERSE_DATA_DIR
        value: /tmp/stockverse
